# Flyway Configuration File

# JDBC URL for PostgreSQL connection
flyway.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:erp_system}

# Database user
flyway.user=${DB_USER:postgres}

# Database password
flyway.password=${DB_PASSWORD:password}

# Location of migration scripts
flyway.locations=filesystem:migrations

# Table to track migration state
flyway.table=flyway_schema_history

# Whether to automatically create schemas
flyway.createSchemas=true

# Default schema
flyway.defaultSchema=public

# Encoding of SQL migration files
flyway.encoding=UTF-8

# Whether to validate migrations when running migrate
flyway.validateOnMigrate=true

# Allow mixing transactional and non-transactional statements
flyway.mixed=false

# Group all pending migrations together in the same transaction when possible
flyway.group=false

# The file name prefix for versioned SQL migrations
flyway.sqlMigrationPrefix=V

# The file name separator for versioned SQL migrations
flyway.sqlMigrationSeparator=__

# The file name suffix for versioned SQL migrations
flyway.sqlMigrationSuffix=.sql

# Placeholder replacement settings
flyway.placeholderReplacement=true
flyway.placeholderPrefix=${
flyway.placeholderSuffix=}

# Whether to allow missing migrations
flyway.ignoreMissingMigrations=false

# Whether to allow ignored migrations
flyway.ignoreIgnoredMigrations=false

# Whether to allow pending migrations
flyway.ignorePendingMigrations=false

# Whether to allow future migrations
flyway.ignoreFutureMigrations=true

# Baseline version
flyway.baselineVersion=1.0

# Baseline description
flyway.baselineDescription=<< Flyway Baseline >>

# Whether to baseline on migrate
flyway.baselineOnMigrate=true
