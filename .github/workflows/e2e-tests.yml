name: E2E Tests

on:
  push:
    branches: [ main, module-split ]
  pull_request:
    branches: [ main, module-split ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp_system_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # Setup Backend
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Run Database Migrations
      working-directory: ./backend
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: erp_system_test
        DB_USER: postgres
        DB_PASSWORD: postgres
      run: |
        npm run migrate
        npm run seed:test

    - name: Start Backend Server
      working-directory: ./backend
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: erp_system_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        JWT_SECRET: test-secret
        PORT: 9000
      run: |
        npm run build
        npm start &
        sleep 10

    # Setup Frontend
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

    - name: Start Frontend Server
      working-directory: ./frontend
      env:
        VITE_API_URL: http://localhost:9000/api
      run: |
        npm run preview -- --port 8080 &
        sleep 10

    # Setup E2E Tests
    - name: Install E2E Dependencies
      working-directory: ./e2e_testing
      run: npm ci

    - name: Install Playwright Browsers
      working-directory: ./e2e_testing
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Setup Test Data
      working-directory: ./e2e_testing
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: erp_system_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        API_BASE_URL: http://localhost:9000/api
        BASE_URL: http://localhost:8080
        TEST_USER_EMAIL: test@example.com
        TEST_USER_PASSWORD: testpassword
      run: npm run setup

    # Run E2E Tests
    - name: Run Playwright Tests
      working-directory: ./e2e_testing
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: erp_system_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        API_BASE_URL: http://localhost:9000/api
        BASE_URL: http://localhost:8080
        TEST_USER_EMAIL: test@example.com
        TEST_USER_PASSWORD: testpassword
        CI: true
      run: npx playwright test --project=${{ matrix.browser }}

    # Upload Test Results
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: e2e_testing/reports/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-screenshots-${{ matrix.browser }}
        path: e2e_testing/test-results/
        retention-days: 30

  # Combine test results from all browsers
  test-summary:
    if: always()
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Combine Test Results
      run: |
        echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
        echo "| Browser | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
        
        for browser in chromium firefox webkit; do
          if [ -d "playwright-report-$browser" ]; then
            echo "| $browser | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| $browser | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
        done
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Test artifacts have been uploaded and are available for 30 days." >> $GITHUB_STEP_SUMMARY

  # Deploy test reports to GitHub Pages (optional)
  deploy-report:
    if: always() && github.ref == 'refs/heads/main'
    needs: e2e-tests
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Download test reports
      uses: actions/download-artifact@v4
      with:
        name: playwright-report-chromium
        path: ./reports
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./reports/html-report
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
